<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects Section | Portfolio Upgrade</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-dark: #0a0c10;
        --card-bg: rgba(20, 24, 32, 0.8);
        --card-border: rgba(66, 153, 225, 0.2);
        --accent: #3b82f6;
        --accent-glow: #3b82f6;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --success: #10b981;
        --warning: #f59e0b;
      }

      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #0a0c10 0%, #0f172a 100%);
        color: var(--text-primary);
        padding: 2rem;
        min-height: 100vh;
      }

      /* Section Styling */
      #projects {
        max-width: 1400px;
        margin: 0 auto;
        padding: 4rem 1rem;
      }

      #projects h2 {
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 700;
        text-align: center;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, #fff, #3b82f6, #8b5cf6);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        letter-spacing: -0.02em;
      }

      .section-subtitle {
        text-align: center;
        color: var(--text-secondary);
        margin-bottom: 3rem;
        font-size: 1.1rem;
      }

      /* Filter Bar */
      .filter-bar {
        display: flex;
        justify-content: center;
        gap: 0.8rem;
        flex-wrap: wrap;
        margin-bottom: 3rem;
      }

      .filter-btn {
        padding: 8px 20px;
        border-radius: 40px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 0.9rem;
        font-weight: 500;
        backdrop-filter: blur(10px);
      }

      .filter-btn:hover {
        background: rgba(59, 130, 246, 0.2);
        border-color: var(--accent);
        color: white;
        transform: translateY(-2px);
      }

      .filter-btn.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      }

      /* Projects Grid */
      .projects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 2rem;
        margin-top: 1rem;
      }

      /* Enhanced Project Card */
      .project-card {
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        border-radius: 24px;
        padding: 1.8rem;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid var(--card-border);
        position: relative;
        overflow: hidden;
        cursor: pointer;
        animation: fadeInUp 0.6s ease-out forwards;
        opacity: 0;
      }

      .project-card:nth-child(1) {
        animation-delay: 0.1s;
      }
      .project-card:nth-child(2) {
        animation-delay: 0.2s;
      }
      .project-card:nth-child(3) {
        animation-delay: 0.3s;
      }
      .project-card:nth-child(4) {
        animation-delay: 0.4s;
      }
      .project-card:nth-child(5) {
        animation-delay: 0.5s;
      }
      .project-card:nth-child(6) {
        animation-delay: 0.6s;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .project-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--accent), #8b5cf6, #ec489a);
        transform: scaleX(0);
        transition: transform 0.4s ease;
      }

      .project-card:hover::before {
        transform: scaleX(1);
      }

      .project-card:hover {
        transform: translateY(-12px);
        box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.5);
        border-color: rgba(59, 130, 246, 0.4);
      }

      /* Project Badge */
      .project-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.7rem;
        font-weight: 600;
        margin-bottom: 1rem;
        background: rgba(59, 130, 246, 0.2);
        color: var(--accent);
        letter-spacing: 0.5px;
      }

      .project-card h3 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        color: white;
        line-height: 1.3;
      }

      .project-description {
        color: var(--text-secondary);
        line-height: 1.6;
        margin-bottom: 1.2rem;
        font-size: 0.9rem;
      }

      /* Tech Stack */
      .tech-stack {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }

      .tech-tag {
        background: rgba(255, 255, 255, 0.08);
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 0.7rem;
        color: var(--text-secondary);
        transition: all 0.2s;
      }

      .tech-tag:hover {
        background: rgba(59, 130, 246, 0.3);
        color: white;
      }

      /* Project Links */
      .project-links {
        display: flex;
        gap: 1rem;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 0.5rem;
      }

      .project-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        border-radius: 40px;
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 500;
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .link-demo {
        background: var(--accent);
        color: white;
        border: none;
      }

      .link-demo:hover {
        background: #2563eb;
        transform: translateX(4px);
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
      }

      .link-code {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text-secondary);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .link-code:hover {
        background: rgba(255, 255, 255, 0.15);
        color: white;
        border-color: var(--accent);
      }

      /* Stats & Metrics */
      .project-stats {
        display: flex;
        gap: 1rem;
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 0.75rem;
        color: var(--text-secondary);
      }

      .stat {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .stat i {
        font-size: 0.7rem;
      }

      /* Modal for Project Details */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(20px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        padding: 2rem;
        animation: fadeIn 0.3s ease;
      }

      .modal.active {
        display: flex;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .modal-content {
        max-width: 600px;
        width: 100%;
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        border-radius: 32px;
        padding: 2rem;
        border: 1px solid rgba(59, 130, 246, 0.3);
        transform: scale(0.9);
        animation: scaleIn 0.3s ease forwards;
      }

      @keyframes scaleIn {
        to {
          transform: scale(1);
        }
      }

      .modal-content h3 {
        font-size: 1.8rem;
        margin-bottom: 1rem;
      }

      .modal-close {
        float: right;
        cursor: pointer;
        font-size: 1.5rem;
        color: var(--text-secondary);
        transition: color 0.2s;
      }

      .modal-close:hover {
        color: white;
      }

      /* Empty State */
      .empty-state {
        text-align: center;
        padding: 4rem;
        color: var(--text-secondary);
        grid-column: 1 / -1;
      }

      .empty-state i {
        font-size: 4rem;
        margin-bottom: 1rem;
        opacity: 0.5;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .projects-grid {
          grid-template-columns: 1fr;
          gap: 1.5rem;
        }

        .filter-btn {
          padding: 6px 16px;
          font-size: 0.8rem;
        }

        .modal-content {
          padding: 1.5rem;
        }
      }

      /* Scroll Animation Observer */
      .project-card {
        opacity: 0;
        transform: translateY(30px);
      }

      .project-card.visible {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <section id="projects">
      <h2>Featured Projects</h2>
      <div class="section-subtitle">
        <i class="fas fa-code"></i> Crafting digital experiences that matter
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-category="all">
          All Projects
        </button>
        <button class="filter-btn" data-category="web">Web Apps</button>
        <button class="filter-btn" data-category="mobile">Mobile</button>
        <button class="filter-btn" data-category="ai">AI/ML</button>
        <button class="filter-btn" data-category="fullstack">Full Stack</button>
      </div>

      <!-- Projects Grid -->
      <div class="projects-grid" id="projectsContainer"></div>
    </section>

    <!-- Modal for Project Details -->
    <div id="projectModal" class="modal">
      <div class="modal-content">
        <span class="modal-close" id="modalClose">&times;</span>
        <div id="modalBody"></div>
      </div>
    </div>

    <script>
      // Enhanced Projects Data with rich content
      const projectsData = [
        {
          id: 1,
          title: "AI Content Studio",
          description:
            "Revolutionary platform that uses GPT-4 and DALL-E to generate marketing content and visuals. Used by 500+ creators.",
          longDescription:
            "A comprehensive content generation suite that combines multiple AI models to help creators produce high-quality marketing materials, blog posts, and social media visuals in minutes. Features include custom templates, batch processing, and API integration.",
          techStack: ["React", "Node.js", "OpenAI API", "Tailwind", "MongoDB"],
          category: "ai",
          demoLink: "#",
          codeLink: "#",
          stats: { stars: 245, forks: 67, usedBy: "500+" },
          image: "🎨",
          featured: true,
        },
        {
          id: 2,
          title: "EcoTrack Mobile",
          description:
            "Sustainable living app that tracks carbon footprint and suggests eco-friendly alternatives.",
          longDescription:
            "Mobile app helping users reduce their environmental impact through smart tracking and personalized recommendations. Features include carbon calculator, eco-challenges, community leaderboards, and integration with smart home devices.",
          techStack: ["React Native", "Firebase", "TensorFlow Lite", "Redux"],
          category: "mobile",
          demoLink: "#",
          codeLink: "#",
          stats: { downloads: "10K+", rating: 4.8, activeUsers: "2.5K" },
          image: "🌱",
          featured: true,
        },
        {
          id: 3,
          title: "Nexus Dashboard",
          description:
            "Enterprise analytics dashboard with real-time data visualization and predictive insights.",
          longDescription:
            "Powerful dashboard solution for businesses to monitor KPIs, visualize complex datasets, and get AI-powered predictions. Supports multiple data sources, custom widgets, and export capabilities.",
          techStack: ["Vue.js", "D3.js", "Python", "FastAPI", "PostgreSQL"],
          category: "web",
          demoLink: "#",
          codeLink: "#",
          stats: { companies: "45+", uptime: "99.9%", avgResponse: "120ms" },
          image: "📊",
          featured: true,
        },
        {
          id: 4,
          title: "MediCare Hub",
          description:
            "Telemedicine platform connecting patients with healthcare providers seamlessly.",
          longDescription:
            "Complete telemedicine solution with video consultations, prescription management, EHR integration, and secure messaging. HIPAA compliant with end-to-end encryption.",
          techStack: ["Next.js", "WebRTC", "Prisma", "Redis", "AWS"],
          category: "fullstack",
          demoLink: "#",
          codeLink: "#",
          stats: { doctors: "120+", patients: "3.2K", appointments: "15K+" },
          image: "🏥",
          featured: false,
        },
        {
          id: 5,
          title: "StyleMind AI",
          description:
            "Fashion recommendation engine using computer vision and style analysis.",
          longDescription:
            "AI-powered fashion assistant that analyzes your wardrobe, suggests outfits, and recommends new purchases based on your style profile and trends.",
          techStack: ["Python", "PyTorch", "Flask", "React", "TensorFlow"],
          category: "ai",
          demoLink: "#",
          codeLink: "#",
          stats: { accuracy: "92%", users: "8.5K", styles: "500+" },
          image: "👗",
          featured: false,
        },
        {
          id: 6,
          title: "TaskFlow Pro",
          description:
            "Collaborative project management tool with Kanban, Gantt charts, and team analytics.",
          longDescription:
            "Modern project management solution designed for agile teams. Features include real-time collaboration, time tracking, resource allocation, and comprehensive reporting.",
          techStack: [
            "TypeScript",
            "Express",
            "MongoDB",
            "Socket.io",
            "Chart.js",
          ],
          category: "fullstack",
          demoLink: "#",
          codeLink: "#",
          stats: { teams: "280+", tasks: "50K+", satisfaction: "96%" },
          image: "📋",
          featured: true,
        },
      ];

      let activeFilter = "all";
      const container = document.getElementById("projectsContainer");
      const filterBar = document.getElementById("filterBar");
      const modal = document.getElementById("projectModal");
      const modalBody = document.getElementById("modalBody");
      const modalClose = document.getElementById("modalClose");

      // Render Projects
      function renderProjects() {
        const filtered =
          activeFilter === "all"
            ? projectsData
            : projectsData.filter(
                (project) => project.category === activeFilter,
              );

        if (filtered.length === 0) {
          container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-search"></i>
            <p>No projects found in this category</p>
            <button class="filter-btn" data-category="all" style="margin-top: 1rem;">Show All</button>
          </div>
        `;
          // Re-attach filter button event
          const emptyBtn = container.querySelector(".empty-state .filter-btn");
          if (emptyBtn) {
            emptyBtn.addEventListener("click", () => {
              activeFilter = "all";
              updateActiveFilter("all");
              renderProjects();
            });
          }
          return;
        }

        container.innerHTML = filtered
          .map(
            (project) => `
        <div class="project-card" data-id="${project.id}">
          <div class="project-badge">
            <i class="fas ${getCategoryIcon(project.category)}"></i> ${getCategoryName(project.category)}
          </div>
          <h3>${project.image || "🚀"} ${project.title}</h3>
          <p class="project-description">${project.description}</p>
          <div class="tech-stack">
            ${project.techStack.map((tech) => `<span class="tech-tag">${tech}</span>`).join("")}
          </div>
          <div class="project-links">
            <a href="${project.demoLink}" class="project-link link-demo" target="_blank">
              <i class="fas fa-external-link-alt"></i> Live Demo
            </a>
            <a href="${project.codeLink}" class="project-link link-code" target="_blank">
              <i class="fab fa-github"></i> Source Code
            </a>
            <button class="project-link link-code details-btn" data-id="${project.id}" style="background: transparent;">
              <i class="fas fa-info-circle"></i> Details
            </button>
          </div>
          <div class="project-stats">
            ${Object.entries(project.stats)
              .map(
                ([key, value]) => `
              <div class="stat">
                <i class="fas ${getStatIcon(key)}"></i>
                <span>${value} ${getStatLabel(key)}</span>
              </div>
            `,
              )
              .join("")}
          </div>
        </div>
      `,
          )
          .join("");

        // Add event listeners for detail buttons
        document.querySelectorAll(".details-btn").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.preventDefault();
            const projectId = parseInt(btn.dataset.id);
            const project = projectsData.find((p) => p.id === projectId);
            if (project) showModal(project);
          });
        });

        // Add animation on scroll
        observeCards();
      }

      function getCategoryIcon(category) {
        const icons = {
          web: "fa-globe",
          mobile: "fa-mobile-alt",
          ai: "fa-brain",
          fullstack: "fa-layer-group",
        };
        return icons[category] || "fa-code";
      }

      function getCategoryName(category) {
        const names = {
          web: "Web App",
          mobile: "Mobile",
          ai: "AI/ML",
          fullstack: "Full Stack",
        };
        return names[category] || category;
      }

      function getStatIcon(key) {
        const icons = {
          stars: "fa-star",
          forks: "fa-code-branch",
          usedBy: "fa-users",
          downloads: "fa-download",
          rating: "fa-star-half-alt",
          activeUsers: "fa-user-check",
          companies: "fa-building",
          uptime: "fa-chart-line",
          avgResponse: "fa-tachometer-alt",
          doctors: "fa-user-md",
          patients: "fa-hospital-user",
          appointments: "fa-calendar-check",
          accuracy: "fa-chart-simple",
          users: "fa-users",
          styles: "fa-palette",
          teams: "fa-users",
          tasks: "fa-tasks",
          satisfaction: "fa-smile",
        };
        return icons[key] || "fa-chart-line";
      }

      function getStatLabel(key) {
        const labels = {
          stars: "stars",
          forks: "forks",
          usedBy: "users",
          downloads: "downloads",
          rating: "rating",
          activeUsers: "active",
          companies: "companies",
          uptime: "uptime",
          avgResponse: "response",
          doctors: "doctors",
          patients: "patients",
          appointments: "appointments",
          accuracy: "accuracy",
          users: "users",
          styles: "styles",
          teams: "teams",
          tasks: "tasks",
          satisfaction: "satisfaction",
        };
        return labels[key] || key;
      }

      function updateActiveFilter(category) {
        document.querySelectorAll(".filter-btn").forEach((btn) => {
          if (btn.dataset.category === category) {
            btn.classList.add("active");
          } else {
            btn.classList.remove("active");
          }
        });
      }

      // Filter Event Listeners
      filterBar.addEventListener("click", (e) => {
        const btn = e.target.closest(".filter-btn");
        if (!btn) return;

        activeFilter = btn.dataset.category;
        updateActiveFilter(activeFilter);
        renderProjects();

        // Smooth scroll to projects
        document
          .getElementById("projects")
          .scrollIntoView({ behavior: "smooth", block: "start" });
      });

      // Modal Functions
      function showModal(project) {
        modalBody.innerHTML = `
        <div style="text-align: center; margin-bottom: 1rem;">
          <div style="font-size: 4rem;">${project.image || "🚀"}</div>
        </div>
        <h3>${project.title}</h3>
        <div class="project-badge" style="margin: 0.5rem 0 1rem 0;">
          ${getCategoryName(project.category)}
        </div>
        <p style="color: var(--text-secondary); line-height: 1.6; margin-bottom: 1.5rem;">
          ${project.longDescription}
        </p>
        <div class="tech-stack" style="margin-bottom: 1.5rem;">
          <strong style="width: 100%; margin-bottom: 0.5rem;">Tech Stack:</strong>
          ${project.techStack.map((tech) => `<span class="tech-tag">${tech}</span>`).join("")}
        </div>
        <div class="project-stats" style="margin-bottom: 1.5rem; flex-wrap: wrap;">
          ${Object.entries(project.stats)
            .map(
              ([key, value]) => `
            <div class="stat">
              <i class="fas ${getStatIcon(key)}"></i>
              <span><strong>${value}</strong> ${getStatLabel(key)}</span>
            </div>
          `,
            )
            .join("")}
        </div>
        <div class="project-links">
          <a href="${project.demoLink}" class="project-link link-demo" target="_blank">
            <i class="fas fa-external-link-alt"></i> Visit Live Demo
          </a>
          <a href="${project.codeLink}" class="project-link link-code" target="_blank">
            <i class="fab fa-github"></i> View Source
          </a>
        </div>
      `;
        modal.classList.add("active");
      }

      function closeModal() {
        modal.classList.remove("active");
      }

      modalClose.addEventListener("click", closeModal);
      modal.addEventListener("click", (e) => {
        if (e.target === modal) closeModal();
      });

      // Scroll Animation Observer
      function observeCards() {
        const cards = document.querySelectorAll(".project-card");
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("visible");
              }
            });
          },
          { threshold: 0.1 },
        );

        cards.forEach((card) => observer.observe(card));
      }

      // Initial render
      renderProjects();

      // Add keyboard escape for modal
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && modal.classList.contains("active")) {
          closeModal();
        }
      });

      // Log success
      console.log(
        "✨ Projects section upgraded with filters, modals, and rich interactions!",
      );
    </script>
  </body>
</html>
