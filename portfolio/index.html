<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tanbir | Developer</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- NAVBAR -->
    <header class="glass">
      <nav>
        <h1 class="logo">Tanbir.dev</h1>
        <ul class="nav-links">
          <li><a href="#hero">Home</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#projects">Work</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
        <button type="button" id="theme-toggle" aria-label="Toggle theme">☀️</button>
      </nav>
    </header>

    <!-- HERO -->
    <section id="hero" class="hero">
      <div class="hero-content">
        <h2>Crafting Digital Experiences</h2>
        <p>Full Stack Developer • Storyteller • Future Nomad</p>
        <a href="#projects" class="btn">View My Work</a>
      </div>
    </section>

    <!-- ABOUT -->
    <section id="about">
      <h2>About Me</h2>
      <p>I build modern web apps and love exploring new tech.</p>
    </section>

    <!-- PROJECTS -->
    <section id="projects">
      <h2>Projects</h2>
      <div class="projects-grid" id="projects-container"></div>
    </section>

    <!-- CONTACT -->
    <footer id="contact">
      <h2>Contact</h2>
      <form aria-label="Contact Form">
        <input type="text" placeholder="Your Name" required />
        <input type="email" placeholder="Your Email" required />
        <textarea placeholder="Your Message"></textarea>
        <button type="submit">Send</button>
      </form>
    </footer>

    <script src="js/projects.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
